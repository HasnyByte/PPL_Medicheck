<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediChat — Asisten Kesehatan</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #21262d;
    --accent:   #2ea043;
    --accent2:  #1f6feb;
    --text:     #e6edf3;
    --muted:    #7d8590;
    --user-bg:  #1c2d3e;
    --bot-bg:   #161b22;
    --danger:   #f85149;
    --radius:   14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-info p  { font-size: 12px; color: var(--muted); }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    margin-left: auto;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .4; }
  }
  #btn-clear {
    margin-left: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
  }
  #btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Chat Area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Messages ── */
  .msg { display: flex; gap: 12px; max-width: 760px; animation: fadeUp .3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot   { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .msg.user .avatar { background: var(--accent2); }
  .msg.bot  .avatar { background: linear-gradient(135deg, #388bfd22, #2ea04322); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    max-width: 580px;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #1f6feb44;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble ul  { padding-left: 18px; margin: 6px 0; }
  .bubble li  { margin: 3px 0; }
  .bubble p   { margin: 4px 0; }

  /* Sources */
  .sources {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .source-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: #21262d;
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
    color: var(--muted);
  }
  .source-tag span { color: var(--accent); }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 16px;
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* ── Welcome Message ── */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .welcome .big-icon { font-size: 48px; margin-bottom: 16px; }
  .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .welcome p  { font-size: 13px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .2s;
  }
  .suggestion-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Input Area ── */
  footer {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .2s;
    line-height: 1.5;
  }
  #input:focus { border-color: var(--accent2); }
  #input::placeholder { color: var(--muted); }

  #btn-send {
    background: var(--accent2);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all .2s;
    flex-shrink: 0;
  }
  #btn-send:hover:not(:disabled) { background: #388bfd; transform: scale(1.05); }
  #btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🩺</div>
  <div class="header-info">
    <h1>MediChat</h1>
    <p>Asisten Kesehatan berbasis AI</p>
  </div>
  <div class="status-dot"></div>
  <button id="btn-clear" onclick="clearHistory()">🗑 Reset</button>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="big-icon">💊</div>
    <h2>Selamat datang di MediChat</h2>
    <p>Tanyakan apa saja tentang penyakit, gejala, atau informasi kesehatan. Saya akan menjawab berdasarkan database medis kami.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Apa itu diabetes?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Gejala hipertensi</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Cara mencegah stroke</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Perbedaan flu dan pilek</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Tanyakan tentang penyakit atau gejala..."></textarea>
    <button id="btn-send" onclick="sendMessage()">➤</button>
  </div>
  <p class="footer-note">⚠️ Untuk diagnosis resmi, konsultasikan dengan dokter</p>
</footer>

<script>
  // Buat session ID unik per browser tab
  const SESSION_ID = 'session_' + Math.random().toString(36).slice(2, 11);
  const API_BASE = window.location.origin;
  let isLoading = false;

  const chatEl  = document.getElementById('chat');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('btn-send');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Kirim dengan Enter (Shift+Enter = newline)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function appendMessage(role, content, sources = []) {
    // Hapus welcome screen saat pesan pertama
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Render markdown-like formatting sederhana
    bubble.innerHTML = formatText(content);

    // Tampilkan sumber dokumen
    if (sources && sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const tag = document.createElement('div');
        tag.className = 'source-tag';
        tag.innerHTML = `📄 ${s.title} <span>${(s.score * 100).toFixed(0)}%</span>`;
        srcDiv.appendChild(tag);
      });
      bubble.appendChild(srcDiv);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(.+)$/, '<p>$1</p>');
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;
    chatEl.appendChild(msg);
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, message: text }),
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json();
        appendMessage('bot', `❌ Error: ${err.detail || 'Terjadi kesalahan pada server'}`);
        return;
      }

      const data = await res.json();
      appendMessage('bot', data.answer, data.sources);

    } catch (err) {
      hideTyping();
      appendMessage('bot', '❌ Tidak dapat terhubung ke server. Pastikan backend sedang berjalan.');
      console.error(err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function clearHistory() {
    if (!confirm('Reset percakapan ini?')) return;
    await fetch(`${API_BASE}/clear`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID }),
    });
    chatEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="big-icon">💊</div>
        <h2>Percakapan direset</h2>
        <p>Mulai percakapan baru tentang penyakit atau kesehatan.</p>
      </div>`;
  }
</script>
</body>
</html>
